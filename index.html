<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>15 Anos — Convite Especial</title>
    <link
      rel="shortcut icon"
      href="public/img/bola-de-basquete.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="public/css/app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,400;1,700&family=Barlow+Condensed:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <script src="public/js/app.js" defer></script>
  </head>

  <body>
    <div class="container">
      <!-- ===================== HERO ===================== -->
      <header class="hero">
        <div class="hero-bg-glow"></div>
        <div class="hero-bg-glow-pink"></div>

        <!-- Número de fundo decorativo -->
        <div class="hero-number" aria-hidden="true">15</div>

        <!-- Cena: bola acertando a cesta (SVG animado) -->
        <div class="basket-scene" aria-hidden="true">
          <svg
            viewBox="0 0 300 260"
            xmlns="http://www.w3.org/2000/svg"
            width="300"
            height="260"
            style="overflow: visible"
          >
            <defs>
              <!-- Bola: gradiente radial realista -->
              <radialGradient id="bGrad" cx="38%" cy="32%" r="58%">
                <stop offset="0%" stop-color="#ffaa55" />
                <stop offset="55%" stop-color="#e8621a" />
                <stop offset="100%" stop-color="#a33200" />
              </radialGradient>
              <radialGradient id="bShine" cx="32%" cy="28%" r="38%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.42)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
              </radialGradient>
              <clipPath id="bClip">
                <circle cx="0" cy="0" r="22" />
              </clipPath>
              <!-- Sombra/glow laranja no chão -->
              <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(255,107,26,0.45)" />
                <stop offset="100%" stop-color="rgba(255,107,26,0)" />
              </radialGradient>
              <!-- Flash de acerto -->
              <radialGradient id="flashGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(255,200,80,0.7)" />
                <stop offset="100%" stop-color="rgba(255,107,26,0)" />
              </radialGradient>
            </defs>

            <!-- === ARO (basket rim) === -->
            <!-- Aro: elipse para efeito 3D – parte de trás (oculta pela bola depois) -->
            <ellipse
              cx="186"
              cy="108"
              rx="28"
              ry="6"
              fill="none"
              stroke="#cc3300"
              stroke-width="4"
              stroke-dasharray="1 0"
            />
            <!-- Sombra do aro no espaço -->
            <ellipse cx="186" cy="116" rx="22" ry="4" fill="rgba(0,0,0,0.35)" />

            <!-- === REDE === -->
            <!-- Grupo da rede – será animado via JS -->
            <g id="net">
              <!-- Linhas verticais da rede -->
              <line
                x1="164"
                y1="112"
                x2="168"
                y2="155"
                stroke="rgba(220,220,220,0.55)"
                stroke-width="1"
              />
              <line
                x1="172"
                y1="112"
                x2="174"
                y2="158"
                stroke="rgba(220,220,220,0.55)"
                stroke-width="1"
              />
              <line
                x1="180"
                y1="113"
                x2="181"
                y2="160"
                stroke="rgba(220,220,220,0.55)"
                stroke-width="1"
              />
              <line
                x1="188"
                y1="113"
                x2="188"
                y2="160"
                stroke="rgba(220,220,220,0.55)"
                stroke-width="1"
              />
              <line
                x1="196"
                y1="113"
                x2="196"
                y2="158"
                stroke="rgba(220,220,220,0.55)"
                stroke-width="1"
              />
              <line
                x1="204"
                y1="112"
                x2="202"
                y2="155"
                stroke="rgba(220,220,220,0.55)"
                stroke-width="1"
              />
              <line
                x1="210"
                y1="110"
                x2="206"
                y2="153"
                stroke="rgba(220,220,220,0.55)"
                stroke-width="1"
              />
              <!-- Linhas horizontais da rede -->
              <path
                d="M164 122 Q186 126 210 122"
                fill="none"
                stroke="rgba(200,200,200,0.45)"
                stroke-width="0.8"
              />
              <path
                d="M165 132 Q186 137 209 132"
                fill="none"
                stroke="rgba(200,200,200,0.45)"
                stroke-width="0.8"
              />
              <path
                d="M166 142 Q186 148 208 142"
                fill="none"
                stroke="rgba(200,200,200,0.45)"
                stroke-width="0.8"
              />
              <path
                d="M167 150 Q186 157 207 150"
                fill="none"
                stroke="rgba(200,200,200,0.4)"
                stroke-width="0.8"
              />
              <!-- Fundo arredondado da rede -->
              <path
                d="M168 155 Q186 168 206 153"
                fill="none"
                stroke="rgba(200,200,200,0.5)"
                stroke-width="1"
              />
            </g>

            <!-- === ARO: parte da frente (sobre a rede) === -->
            <path
              d="M158 108 A28 6 0 0 0 214 108"
              fill="none"
              stroke="#dd3300"
              stroke-width="4.5"
              stroke-linecap="round"
            />

            <!-- === SOMBRA DA BOLA NO CHÃO === -->
            <ellipse
              id="ballShadow"
              cx="60"
              cy="230"
              rx="18"
              ry="5"
              fill="url(#shadowGrad)"
              opacity="0"
            />

            <!-- === FLASH DE ACERTO === -->
            <circle
              id="flash"
              cx="186"
              cy="108"
              r="0"
              fill="url(#flashGrad)"
              opacity="0"
            />

            <!-- === RASTRO DA BOLA (motion blur) === -->
            <g id="trail" opacity="0">
              <circle
                cx="0"
                cy="0"
                r="18"
                fill="rgba(255,107,26,0.12)"
                id="t1"
              />
              <circle
                cx="0"
                cy="0"
                r="14"
                fill="rgba(255,107,26,0.08)"
                id="t2"
              />
            </g>

            <!-- === BOLA DE BASQUETE === -->
            <g id="ball" transform="translate(30, 220)">
              <!-- Corpo principal -->
              <circle cx="0" cy="0" r="22" fill="url(#bGrad)" />
              <!-- Linhas da bola com clip -->
              <g
                clip-path="url(#bClip)"
                fill="none"
                stroke="rgba(100,30,0,0.65)"
                stroke-width="1.8"
              >
                <!-- Linha equatorial horizontal -->
                <path d="M-22 0 Q-11 -9 0 -9 Q11 -9 22 0" />
                <path d="M-22 0 Q-11 9 0 9 Q11 9 22 0" />
                <!-- Linha meridional vertical -->
                <path d="M0 -22 Q8 -11 8 0 Q8 11 0 22" />
                <path d="M0 -22 Q-8 -11 -8 0 Q-8 11 0 22" />
              </g>
              <!-- Brilho especular -->
              <circle cx="0" cy="0" r="22" fill="url(#bShine)" />
              <!-- Highlight pontual (highlight spot) -->
              <ellipse
                cx="-7"
                cy="-9"
                rx="6"
                ry="4"
                fill="rgba(255,255,255,0.22)"
                transform="rotate(-25 -7 -9)"
              />
            </g>

            <!-- === PARTÍCULAS DE ACERTO === -->
            <g id="sparks" opacity="0">
              <line
                x1="186"
                y1="108"
                x2="186"
                y2="88"
                stroke="#ffcc44"
                stroke-width="2"
                stroke-linecap="round"
                id="sp1"
              />
              <line
                x1="186"
                y1="108"
                x2="206"
                y2="92"
                stroke="#ff8822"
                stroke-width="2"
                stroke-linecap="round"
                id="sp2"
              />
              <line
                x1="186"
                y1="108"
                x2="166"
                y2="92"
                stroke="#ff8822"
                stroke-width="2"
                stroke-linecap="round"
                id="sp3"
              />
              <line
                x1="186"
                y1="108"
                x2="210"
                y2="108"
                stroke="#ffcc44"
                stroke-width="1.5"
                stroke-linecap="round"
                id="sp4"
              />
              <line
                x1="186"
                y1="108"
                x2="162"
                y2="108"
                stroke="#ffcc44"
                stroke-width="1.5"
                stroke-linecap="round"
                id="sp5"
              />
            </g>
          </svg>
        </div>

        <div class="hero-content">
          <div class="hero-tag">✦ Convite Especial ✦</div>
          <h1 class="hero-title">Celebre <span>15 Anos</span><br />comigo!</h1>
          <p class="hero-subtitle">
            Sua presença transforma este dia num jogo inesquecível.
          </p>
        </div>
      </header>

      <div class="court-line"></div>

      <!-- ===================== DETALHES ===================== -->
      <section class="details">
        <div class="card">
          <div class="detail-row">
            <div class="detail-item">
              <div class="detail-label">Data</div>
              <div class="detail-value">19 Jul</div>
              <div class="detail-subvalue">Domingo</div>
            </div>
            <div class="divider-v"></div>
            <div class="detail-item">
              <div class="detail-label">Horário</div>
              <div class="detail-value">11:30h</div>
              <div class="detail-subvalue">Em quadra!</div>
            </div>
          </div>

          <div class="venue-row">
            <div class="venue-name">Estância Shalom Birigui</div>
            <div class="venue-sub">
              Espaço Para Festas e Eventos · Birigui – SP
            </div>
            <a
              href="https://maps.google.com/?q=Estância+Shalom+Birigui"
              target="_blank"
              class="btn-maps"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
              Como Chegar
            </a>
          </div>
        </div>
      </section>

      <!-- ===================== RSVP ===================== -->
      <section class="rsvp">
        <div class="section-header">
          <span class="section-eyebrow"></span>
          <h2 class="section-title">Confirmar Presença</h2>
        </div>

        <form id="rsvpForm">
          <div class="form-group">
            <label for="fullname">Nome Completo</label>
            <input
              type="text"
              id="fullname"
              name="fullname"
              class="form-control"
              placeholder="Seu nome e sobrenome"
              required
            />
          </div>

          <div class="form-group">
            <label>Você irá comparecer?</label>
            <div class="radio-group">
              <label class="radio-option">
                <input
                  type="radio"
                  name="attendance"
                  value="Sim"
                  checked
                  required
                />

                <svg
                  class="ball-icon"
                  viewBox="0 0 44 44"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <defs>
                    <radialGradient id="rg1" cx="36%" cy="32%" r="58%">
                      <stop offset="0%" stop-color="#ffaa55" />
                      <stop offset="55%" stop-color="#e8621a" />
                      <stop offset="100%" stop-color="#a33200" />
                    </radialGradient>
                    <radialGradient id="rs1" cx="30%" cy="26%" r="36%">
                      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
                      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                    </radialGradient>
                    <clipPath id="bc1">
                      <circle cx="22" cy="22" r="20" />
                    </clipPath>
                  </defs>
                  <circle cx="22" cy="22" r="20" fill="url(#rg1)" />
                  <g
                    clip-path="url(#bc1)"
                    fill="none"
                    stroke="rgba(90,20,0,0.6)"
                    stroke-width="1.4"
                  >
                    <path d="M22 2 Q29 11 29 22 Q29 33 22 42" />
                    <path d="M22 2 Q15 11 15 22 Q15 33 22 42" />
                    <path d="M2 22 Q11 15 22 15 Q33 15 42 22" />
                    <path d="M2 22 Q11 29 22 29 Q33 29 42 22" />
                  </g>
                  <circle cx="22" cy="22" r="20" fill="url(#rs1)" />
                  <ellipse
                    cx="16"
                    cy="14"
                    rx="5"
                    ry="3"
                    fill="rgba(255,255,255,0.18)"
                    transform="rotate(-20 16 14)"
                  />
                </svg>
                <span>Sim!</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="attendance" value="Não" />
                <svg
                  class="ball-icon"
                  viewBox="0 0 44 44"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <defs>
                    <radialGradient id="rg2" cx="36%" cy="32%" r="58%">
                      <stop offset="0%" stop-color="#ffaa55" />
                      <stop offset="55%" stop-color="#e8621a" />
                      <stop offset="100%" stop-color="#a33200" />
                    </radialGradient>
                    <radialGradient id="rs2" cx="30%" cy="26%" r="36%">
                      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
                      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                    </radialGradient>
                    <clipPath id="bc2">
                      <circle cx="22" cy="22" r="20" />
                    </clipPath>
                  </defs>
                  <circle cx="22" cy="22" r="20" fill="url(#rg2)" />
                  <g
                    clip-path="url(#bc2)"
                    fill="none"
                    stroke="rgba(90,20,0,0.6)"
                    stroke-width="1.4"
                  >
                    <path d="M22 2 Q29 11 29 22 Q29 33 22 42" />
                    <path d="M22 2 Q15 11 15 22 Q15 33 22 42" />
                    <path d="M2 22 Q11 15 22 15 Q33 15 42 22" />
                    <path d="M2 22 Q11 29 22 29 Q33 29 42 22" />
                  </g>
                  <circle cx="22" cy="22" r="20" fill="url(#rs2)" />
                  <ellipse
                    cx="16"
                    cy="14"
                    rx="5"
                    ry="3"
                    fill="rgba(255,255,255,0.18)"
                    transform="rotate(-20 16 14)"
                  />
                  <!-- X de recusa -->
                  <line
                    x1="13"
                    y1="13"
                    x2="31"
                    y2="31"
                    stroke="rgba(255,255,255,0.85)"
                    stroke-width="2.5"
                    stroke-linecap="round"
                  />
                  <line
                    x1="31"
                    y1="13"
                    x2="13"
                    y2="31"
                    stroke="rgba(255,255,255,0.85)"
                    stroke-width="2.5"
                    stroke-linecap="round"
                  />
                </svg>
                <span>Não poderei</span>
              </label>
            </div>
          </div>

          <div id="attendance_dependent_fields">
            <div class="form-group">
              <label for="companions_count">Quantidade de acompanhantes</label>
              <select
                id="companions_count"
                name="companions_count"
                class="form-control"
              >
                <option value="0">0 — Só eu mesmo</option>
                <option value="1">1 acompanhante</option>
                <option value="2">2 acompanhantes</option>
                <option value="3">3 acompanhantes</option>
                <option value="4">4 acompanhantes</option>
                <option value="5">5 acompanhantes</option>
              </select>
            </div>

            <div class="form-group" id="companions_section">
              <label for="companions_names">Nome dos acompanhantes</label>
              <textarea
                id="companions_names"
                name="companions_names"
                class="form-control"
                rows="2"
                placeholder="Ex: Maria Silva (Adulto), João Silva (Criança - 5 anos)"
              ></textarea>
            </div>
          </div>

          <div class="form-group">
            <label for="message">Mensagem para a aniversariante</label>
            <textarea
              id="message"
              name="message"
              class="form-control"
              rows="3"
              placeholder="Deixe seu recado carinhoso... (opcional)"
            ></textarea>
          </div>

          <button type="submit" id="btnSubmit" class="btn-submit">
            Confirmar Presença!
          </button>
        </form>

        <div
          id="successMessage"
          class="alert alert-success"
          style="display: none"
        ></div>
      </section>
      <footer class="footer-credit">R S V P — 1 5 A N O S</footer>
    </div>
  </body>
</html>
